name: Upload Private Banking Video to R2
on:
  push:
    branches: [ main ]
steps:
  - name: Checkout
    uses: actions/checkout@v3
  - name: Setup Python
    uses: actions/setup-python@v4
    with:
      python-version: '3.11'
  - name: Install dependencies
    run: |
      pip install boto3 requests
  - name: Upload video to R2
    id: upload
    run: python r2_upload.py