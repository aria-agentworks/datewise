name: Strike
on:
  push:
    paths-ignore:
      - 'STRIKE_CONFIRMED.txt'
      - 'STRIKE_LOG.txt'
jobs:
  strike:
    runs-on: ubuntu-latest
    env:
      AWS_ACCESS_KEY_ID: a970eb068f3a6e1001defd42696cd440
      AWS_SECRET_ACCESS_KEY: afd7dba583ae4a2225f5c0feede764ada51d69dddad1dc8507d3e3c578dc4ef7
      AWS_DEFAULT_REGION: auto
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
      - name: Install dependencies
        run: |
          pip install boto3 requests awscli
      - name: Run R2 upload script
        run: python r2_final.py
      - name: List bucket contents (if upload succeeded)
        if: success()
        run: aws s3 ls s3://qte2wq7f5yx91i2k4uoye3u8pln544fp --endpoint-url https://qte2wq7f5yx91i2k4uoye3u8pln544fp.r2.cloudflarestorage.com > STRIKE_CONFIRMED.txt
      - name: Commit STRIKE_CONFIRMED.txt
        if: success()
        run: |
          git config user.name "github-actions"
          git config user.email "action@github.com"
          git add STRIKE_CONFIRMED.txt
          git diff --cached --quiet || git commit -m "Confirm strike"
          git push origin HEAD:${{ github.ref_name }}
      - name: Preserve STRIKE_LOG.txt (always)
        if: always()
        run: |
          # STRIKE_LOG.txt is created by r2_final.py
          git config user.name "github-actions"
          git config user.email "action@github.com"
          git add STRIKE_LOG.txt
          git diff --cached --quiet || git commit -m "Save strike log"
          git push origin HEAD:${{ github.ref_name }}