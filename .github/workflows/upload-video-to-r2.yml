name: Upload Video to R2

on:
  workflow_dispatch:

jobs:
  upload-video:
    runs-on: ubuntu-latest

    outputs:
      object-url:
        description: 'S3 URL of the uploaded video'
        value: ${{ steps.upload.outputs.object-url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install AWS CLI v2
        run: |
          sudo apt-get update
          sudo apt-get install -y awscli

      - name: Configure AWS CLI for R2
        run: |
          aws configure set aws_access_key_id ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws configure set aws_secret_access_key ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws configure set region "auto"

      - name: Download video from Google Cloud Storage
        run: |
          mkdir temp
          curl -L "https://videos.plexels.com/video-files/8733007/8733007-uh_2560_1440_30fps.mp4" -o temp/video.mp4
          # Verify the file was downloaded
          ls -lah temp/video.mp4

      - name: Upload video to R2
        id: upload
        run: |
          # Construct R2 endpoint URL
          R2_ENDPOINT="https://${{ secrets.AWS_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com"
          
          # Upload file with the specified key
          aws s3 cp temp/video.mp4 "s3:://${{ secrets.AWS_R2_ACCOUNT_ID }}/private_banking_v1.mp4" \
            --endpoint-url "$R2_ENDPOINT" \
            --acl public-read \
            --content-type video/mp4

          # Generate the object URL (S3-compatible URL)
          OBJECT_URL="https://${{ secrets.AWS_R2_ACCOUNT_ID }}.r2.cloudflarestorage.com/private_banking_v1.mp4"
          echo "object-url=$OBJECT_URL" >> $GITHUB_OUTPUT
          
          # Also print for debugging
          echo "Uploaded video to: $OBJECT_URL"

    # Steps for cleanup can be added here if needed